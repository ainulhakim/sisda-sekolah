{% extends "base.html" %}
{% block title %}{{ 'Edit' if lomba else 'Tambah' }} Lomba{% endblock %}
{% block content %}
<h4 class="mb-4"><i class="fas fa-trophy me-2"></i>{{ 'Edit' if lomba else 'Tambah' }} Lomba</h4>
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label fw-bold">Nama Lomba <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="nama_lomba" value="{{ lomba.nama_lomba if lomba else '' }}" required>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Bidang</label>
                    <select class="form-select" name="bidang">
                        <option value="">-- Pilih Bidang --</option>
                        {% for b in ['Akademik','Olahraga','Seni','Keagamaan','Teknologi'] %}
                        <option value="{{ b }}" {% if lomba and lomba.bidang == b %}selected{% endif %}>{{ b }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Tingkat</label>
                    <select class="form-select" name="tingkat">
                        <option value="">-- Pilih Tingkat --</option>
                        {% for t in ['Sekolah','Kecamatan','Kabupaten','Provinsi','Nasional'] %}
                        <option value="{{ t }}" {% if lomba and lomba.tingkat == t %}selected{% endif %}>{{ t }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Penyelenggara</label>
                    <input type="text" class="form-control" name="penyelenggara" value="{{ lomba.penyelenggara if lomba else '' }}" placeholder="Contoh: Dinas Pendidikan">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Tanggal</label>
                    <input type="date" class="form-control" name="tanggal" value="{{ lomba.tanggal.strftime('%Y-%m-%d') if lomba and lomba.tanggal else '' }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Tahun Ajaran</label>
                <select class="form-select" name="tahun_ajaran_id">
                    <option value="">-- Tidak Terikat --</option>
                    {% for ta in ta_list %}
                    <option value="{{ ta.id }}" {% if lomba and lomba.tahun_ajaran_id == ta.id %}selected{% endif %}>{{ ta.nama }} (Semester {{ ta.semester }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Simpan</button>
                <a href="{{ url_for('routes.lomba_list') }}" class="btn btn-outline-secondary">Batal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

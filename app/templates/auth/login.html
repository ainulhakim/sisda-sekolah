{% extends "base.html" %}
{% block fullpage %}
<div class="login-page d-flex align-items-center justify-content-center min-vh-100">
    <div class="login-card card shadow-lg border-0" style="width: 100%; max-width: 420px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="login-icon mb-3">
                    <i class="fas fa-school fa-4x text-primary"></i>
                </div>
                <h3 class="fw-bold">SiSD</h3>
                <p class="text-muted">Sistem Informasi Sekolah Dasar</p>
            </div>
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} py-2">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" name="username" required autofocus placeholder="Masukkan username">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" name="password" required placeholder="Masukkan password">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                    <i class="fas fa-sign-in-alt me-2"></i>Masuk
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

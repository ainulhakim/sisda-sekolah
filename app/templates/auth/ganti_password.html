{% extends "base.html" %}
{% block title %}Ganti Password{% endblock %}
{% block content %}
<h4 class="mb-4"><i class="fas fa-key me-2"></i>Ganti Password</h4>
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white">
                <h6 class="mb-0"><i class="fas fa-lock me-2"></i>Ubah Password Anda</h6>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('auth.ganti_password') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Password Lama</label>
                        <input type="password" class="form-control" name="password_lama" required placeholder="Masukkan password lama">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password Baru</label>
                        <input type="password" class="form-control" name="password_baru" required placeholder="Minimal 6 karakter" minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Konfirmasi Password Baru</label>
                        <input type="password" class="form-control" name="konfirmasi_password" required placeholder="Ulangi password baru" minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save me-1"></i>Simpan Perubahan</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
